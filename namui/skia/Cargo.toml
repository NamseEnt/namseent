[package]
name = "namui-skia"
version = "0.1.0"
edition = "2024"

[package.metadata.namui]
targets = [
    "x86_64-pc-windows-msvc",
    "x86_64-unknown-linux-gnu",
    "wasm32-wasi-web",
    "aarch64-apple-darwin",
]

[dependencies]
namui-type = { path = "../namui-type" }
namui-rendering-tree = { path = "../rendering-tree" }
skia-safe = { path = "../third-party-forks/rust-skia/skia-safe" }
tokio = { path = "../third-party-forks/tokio/tokio", features = ["rt"] }
anyhow = { version = "1.0.75", features = ["backtrace"] }
textwrap = "0.16.0"
unicode-segmentation = "1.10.1"
derive_more = { version = "1.0.0", features = ["debug"] }
bytes = "1.10.1"

[target.'cfg(target_os="wasi")'.dependencies]
skia-safe = { path = "../third-party-forks/rust-skia/skia-safe", features = [
    "gl",
    "freetype-woff2",
    "embed-freetype",
] }

[target.'cfg(not(target_os="wasi"))'.dependencies]
winit = { version = "0.30.2" }

[target.'cfg(target_os="windows")'.dependencies]
skia-safe = { path = "../third-party-forks/rust-skia/skia-safe", features = [
    "d3d",
    "freetype-woff2",
    "embed-freetype",
] }
windows = { version = "0.61.1", features = [
    "Win32",
    "Win32_Graphics",
    "Win32_Graphics_Dxgi",
    "Win32_Graphics_Direct3D12",
    "Win32_Graphics_Direct3D",
    "Win32_Foundation",
    "Win32_Graphics_Dxgi_Common",
    "Win32_Security",
    "Win32_System_Threading",
    "Win32_System",
] }

[target.'cfg(target_os="macos")'.dependencies]
skia-safe = { path = "../third-party-forks/rust-skia/skia-safe", features = [
    "metal",
    "freetype-woff2",
    "embed-freetype",
] }
metal-rs = { package = "metal", version = "0.29" }
core-graphics-types = "0.1"
foreign-types = "0.5"
foreign-types-shared = "0.3"
objc2 = "0.5"

[dev-dependencies]
float-cmp = "0.9.0"
