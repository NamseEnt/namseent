[package]
name = "remote-start"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
anyhow = "1.0.76"
crc = "3.0.1"
crossterm = "0.27.0"
flate2 = "1.0.28"
ratatui = "0.25.0"
rayon = "1.8.0"
reqwest = { version = "0.11.23", features = ["blocking", "json", "gzip"] }
serde = { version = "1.0.193", features = ["derive"] }
serde_json = "1.0.108"
tar = "0.4.40"
walkdir = "2.4.0"
