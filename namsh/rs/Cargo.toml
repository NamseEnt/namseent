[workspace]

[package]
name = "namsh"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
anyhow = "1"
base64 = "0.22"
cookie = "0.18"
hmac = "0.12"
http = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
tracing = "0.1"
forte-json = "=0.1.1"
forte-sdk = "=0.3.5"
doc-db = { package = "fn0-doc-db", version = "=0.4.3" }
object-storage = { package = "fn0-object-storage", version = "=0.1.1" }

[build-dependencies]
forte-codegen = "=0.1.3"
