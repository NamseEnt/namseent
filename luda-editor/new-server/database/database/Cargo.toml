[package]
name = "database"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0.86"
aws-sdk-s3 = "1.34.0"
quick_cache = "0.5.1"
rusqlite = { path = "../rusqlite-0.31.0", features = ["backup", "bundled"] }
tokio = { version = "1.38.0", features = ["rt", "time"] }
migration = { path = "../schema/migration" }
document = { path = "../schema/document" }
rkyv = { version = "0.7.44", features = ["validation"] }
