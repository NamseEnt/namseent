[package]
name = "luda-rpc"
version = "0.1.0"
edition = "2021"

[features]
server = ["dep:database"]
client = []

[dependencies]
proc-macro2 = "1.0.86"
rpc-macro = { path = "./macro" }
quote = "1.0.29"
syn = { version = "2.0.68", features = ["full"] }
rkyv = { version = "0.7.44", features = ["validation"] }
database = { path = "../database/database", optional = true }
anyhow = { version = "1.0.86", features = ["backtrace"] }
migration = { path = "../database/schema/migration" }

[build-dependencies]
walkdir = "2"
proc-macro2 = "1.0.86"
rpc-macro = { path = "./macro" }
quote = "1.0.29"
syn = { version = "2.0.68", features = ["full"] }
rkyv = { version = "0.7.44", features = ["validation"] }
database = { path = "../database/database", optional = true }
anyhow = { version = "1.0.86", features = ["backtrace"] }
migration = { path = "../database/schema/migration" }
